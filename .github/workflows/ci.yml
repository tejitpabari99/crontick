name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile coverage
        run: node scripts/verify-no-lockfile-tampering.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit signatures (advisory, npm >= 10)
        run: |
          node -e "
            const npmVer = require('child_process').execSync('npm --version').toString().trim();
            const [major] = npmVer.split('.').map(Number);
            if (major >= 10) {
              require('child_process').execSync('npm audit signatures', { stdio: 'inherit' });
            } else {
              console.log('npm < 10 — skipping signature audit');
            }
          " || true
        continue-on-error: true

  verify-package:
    name: Verify package tarball
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack dry-run
        run: npm pack --dry-run

      - name: Verify tarball contents
        run: node scripts/verify-tarball.mjs
