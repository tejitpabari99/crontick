name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --production --audit-level=high

      - name: Verify signatures (advisory, npm >= 10)
        run: |
          node -e "
            const npmVer = require('child_process').execSync('npm --version').toString().trim();
            const [npmMajor] = npmVer.split('.').map(Number);
            if (npmMajor >= 10) {
              require('child_process').execSync('npm audit signatures', { stdio: 'inherit' });
            } else {
              console.log('npm < 10, skipping signature audit');
            }
          " || true
